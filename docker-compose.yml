version: '3.9'

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  bridge:
    build:
      context: ./bridge_service
    restart: unless-stopped
    expose:
      - "8001"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - postgres
    expose:
      - "8000"

volumes:
  postgres_data:
