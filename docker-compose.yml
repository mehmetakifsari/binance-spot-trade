version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: visutrade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  bridge:
    build:
      context: ./bridge_service
    container_name: visutrade-bridge
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"

  backend:
    build:
      context: ./backend
    container_name: visutrade-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"

volumes:
  postgres_data:
