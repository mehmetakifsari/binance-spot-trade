{% extends "base.html" %}
{% block content %}
<h2>Trades</h2>
<table>
  <thead><tr><th>Time</th><th>Symbol</th><th>Side</th><th>Qty</th><th>Price</th><th>Notional</th><th>Reason</th></tr></thead>
  <tbody>
    {% for t in trades %}
    <tr>
      <td>{{ t.created_at }}</td>
      <td>{{ t.symbol }}</td>
      <td>{{ t.side }}</td>
      <td>{{ "%.6f"|format(t.qty) }}</td>
      <td>{{ "%.4f"|format(t.price) }}</td>
      <td>{{ "%.4f"|format(t.notional_usdt) }}</td>
      <td>{{ t.reason }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
